<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI in Action | Lucas Willett</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #030014;
            --bg-secondary: #0a0a1a;
            --bg-card: rgba(15, 15, 35, 0.6);
            --bg-card-hover: rgba(25, 25, 55, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #f0f0f5;
            --text-secondary: #9090a8;
            --text-muted: #5a5a70;
            --accent-blue: #6366f1;
            --accent-cyan: #22d3ee;
            --accent-green: #10b981;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --glow-blue: rgba(99, 102, 241, 0.4);
            --glow-green: rgba(16, 185, 129, 0.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 100% 0%, rgba(168, 85, 247, 0.1), transparent),
                radial-gradient(ellipse 50% 30% at 0% 100%, rgba(34, 211, 238, 0.08), transparent);
            animation: bgShift 20s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Grid overlay */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            padding: 50px 0 40px;
            position: relative;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.125rem;
            letter-spacing: -0.02em;
            box-shadow: 0 0 30px var(--glow-blue);
        }

        .header-text h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            font-weight: 400;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.8125rem;
            color: var(--text-primary);
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-link:hover {
            border-color: rgba(99, 102, 241, 0.5);
            background: var(--bg-card-hover);
            box-shadow: 0 0 20px var(--glow-blue);
            transform: translateY(-1px);
        }

        .header-link .arrow {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--glow-green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        /* Section styling */
        section {
            padding: 40px 0;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        section:nth-child(2) { animation-delay: 0.1s; }
        section:nth-child(3) { animation-delay: 0.2s; }
        section:nth-child(4) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(99, 102, 241, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card.highlight {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .stat-card.highlight::before {
            background: linear-gradient(135deg, transparent 0%, rgba(16, 185, 129, 0.08) 100%);
            opacity: 1;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.02em;
        }

        .stat-card.highlight .stat-value {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
        }


        /* Growth / Cumulative Impact */
        .growth-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 28px 18px;
            margin-bottom: 16px;
        }

        .growth-headline {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .growth-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .growth-sub {
            font-size: 0.8125rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .growth-chart {
            width: 100%;
            height: auto;
            display: block;
            overflow: visible;
        }

        .milestones {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .milestone {
            flex: 1 1 140px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .milestone.reached {
            border-color: rgba(16, 185, 129, 0.3);
            background: linear-gradient(135deg, var(--bg-card), rgba(16, 185, 129, 0.06));
        }

        .milestone.next {
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 24px rgba(99, 102, 241, 0.12);
        }

        .milestone-check {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
            font-weight: 700;
        }

        .milestone.reached .milestone-check {
            background: rgba(16, 185, 129, 0.18);
            color: var(--accent-green);
        }

        .milestone.next .milestone-check {
            background: rgba(99, 102, 241, 0.18);
            color: var(--accent-blue);
        }

        .milestone:not(.reached):not(.next) .milestone-check {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
        }

        .milestone-label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .milestone-meta {
            font-size: 0.6875rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Activity Feed */
        .activity-feed {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .activity-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
        }

        .activity-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .activity-icon.deploy { background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(34, 211, 238, 0.1)); }
        .activity-icon.integration { background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.1)); }
        .activity-icon.update { background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.1)); }

        .activity-text {
            flex: 1;
            font-size: 0.9375rem;
            font-weight: 400;
        }

        .activity-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-pink));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.4),
                0 0 100px rgba(99, 102, 241, 0.1);
        }

        .project-card:hover::before,
        .project-card:hover::after {
            opacity: 1;
        }

        .project-card > * {
            position: relative;
            z-index: 1;
        }

        .project-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .project-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        .project-status {
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .project-status.production {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .project-status.development {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .project-status.paused,
        .project-status.dormant {
            background: rgba(245, 158, 11, 0.12);
            color: #f59e0b;
        }

        .project-status.on-demand {
            background: rgba(34, 211, 238, 0.12);
            color: var(--accent-cyan);
        }

        .project-status.completed {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-blue);
        }

        .project-status.retired {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
        }

        .project-card.inactive {
            opacity: 0.72;
        }

        .verify-badge {
            display: inline-block;
            padding: 2px 8px;
            margin-left: 8px;
            border-radius: 100px;
            font-size: 0.5625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            vertical-align: middle;
        }

        .verify-badge.measured {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .verify-badge.usage-verified {
            background: rgba(34, 211, 238, 0.12);
            color: var(--accent-cyan);
        }

        .verify-badge.estimated {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
        }

        .project-name {
            font-size: 1.375rem;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .project-tagline {
            font-size: 0.9375rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .project-description {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .project-impact {
            margin-bottom: 20px;
        }

        .impact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .impact-item::before {
            content: '→';
            color: var(--accent-green);
            font-weight: 600;
        }

        .time-saved {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(34, 211, 238, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 18px;
        }

        .time-saved-value {
            display: block;
            font-weight: 600;
            font-size: 0.9375rem;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .time-saved-calc {
            font-size: 0.6875rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tech-tag {
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.6875rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .tech-tag:hover {
            border-color: var(--accent-blue);
            color: var(--text-secondary);
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .project-link:hover {
            color: var(--accent-cyan);
            gap: 12px;
        }

        /* Footer */
        footer {
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .update-time {
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-text h1 {
                font-size: 1.5rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 1.75rem;
            }

            .header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <header>
        <div class="container">
            <div class="header-content">
                <div class="header-left">
                    <div class="logo">LW</div>
                    <div class="header-text">
                        <h1>AI in Action</h1>
                        <p>Automation & AI Projects</p>
                    </div>
                </div>
                <div class="header-right">
                    <a href="https://kb-answer-bar.lucaswillett.dev" target="_blank" rel="noopener" class="header-link">
                        <span>KB Answer Bar</span>
                        <span class="arrow">↗</span>
                    </a>
                    <div class="status-badge">
                        <span class="status-dot"></span>
                        <span>All Systems Online</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="stats-section">
        <div class="container">
            <h2 class="section-title">Overview</h2>
            <div class="stats-grid" id="stats-grid"></div>
        </div>
    </section>

    <section class="growth-section">
        <div class="container">
            <h2 class="section-title">Cumulative Impact</h2>
            <div class="growth-card" id="growth-card"></div>
            <div class="milestones" id="milestones"></div>
        </div>
    </section>

    <section class="activity-section">
        <div class="container">
            <h2 class="section-title">Recent Activity</h2>
            <div class="activity-feed" id="activity-feed"></div>
        </div>
    </section>

    <section class="projects-section">
        <div class="container">
            <h2 class="section-title">Live Projects</h2>
            <div class="projects-grid" id="projects-grid"></div>
        </div>
    </section>

    <section class="projects-section" id="history-section">
        <div class="container">
            <h2 class="section-title">One-Time Wins, Paused & Retired</h2>
            <div class="projects-grid" id="history-grid"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p class="footer-text">
                Last updated: <span class="update-time" id="update-time">--</span>
            </p>
        </div>
    </footer>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                renderStats(data.stats, data.projects);
                renderGrowth(data.weeklySeries, data.milestones);
                renderActivity(data.activity);
                renderProjects(data.projects);
                document.getElementById('update-time').textContent =
                    new Date(data.meta.lastUpdated).toLocaleString();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function renderStats(stats, projects) {
            const grid = document.getElementById('stats-grid');

            // Headline sums PRODUCTION projects only — paused/retired keep their
            // historical rates in data.json for the cumulative chart, not this stat.
            const totalMinutes = projects
                .filter(p => p.publish !== false && p.timeSaved && p.status === 'production')
                .reduce((sum, p) => sum + (p.timeSaved.weeklyMinutes || 0), 0);
            const totalHours = Math.round(totalMinutes / 60);

            const statItems = [
                { value: stats.projectsLive, label: 'Projects Live' },
                { value: stats.automationsRunning, label: 'Running 24/7' },
                { value: stats.apiCallsToday, label: 'API Calls/Day' },
                { value: `~${totalHours} hrs`, label: 'Saved Weekly', highlight: true }
            ];

            grid.innerHTML = statItems.map(stat => `
                <div class="stat-card ${stat.highlight ? 'highlight' : ''}">
                    <div class="stat-value">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                </div>
            `).join('');
        }

        function renderGrowth(series, milestones) {
            const card = document.getElementById('growth-card');
            const msWrap = document.getElementById('milestones');
            if (!series || series.length < 2) { card.style.display = 'none'; return; }

            const hrs = series.map(s => Math.round((s.cumulativeMinutes || 0) / 60));
            const current = hrs[hrs.length - 1];
            const max = Math.max(...hrs, 1);
            const n = series.length;
            const W = 1000, H = 220, padX = 8, padTop = 16, padBot = 8;
            const xAt = i => padX + i * (W - 2 * padX) / (n - 1);
            const yAt = v => padTop + (H - padTop - padBot) * (1 - v / max);
            const pts = hrs.map((v, i) => [xAt(i), yAt(v)]);
            const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
            const area = `M ${xAt(0).toFixed(1)} ${(H - padBot).toFixed(1)} `
                + pts.map(p => 'L ' + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ')
                + ` L ${xAt(n - 1).toFixed(1)} ${(H - padBot).toFixed(1)} Z`;
            const lastFirst = series[0].week, lastLast = series[n - 1].week;
            const lx = xAt(n - 1), ly = yAt(current);

            card.innerHTML = `
                <div class="growth-headline">
                    <span class="growth-value">~${current.toLocaleString()} hrs</span>
                    <span class="growth-sub">est. cumulative time saved · running sum of per-project weekly rates · ${lastFirst} → ${lastLast}</span>
                </div>
                <svg class="growth-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Cumulative hours saved over time">
                    <defs>
                        <linearGradient id="growthFill" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
                            <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
                        </linearGradient>
                        <linearGradient id="growthLine" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#10b981"/>
                            <stop offset="100%" stop-color="#22d3ee"/>
                        </linearGradient>
                    </defs>
                    <path d="${area}" fill="url(#growthFill)"/>
                    <path d="${line}" fill="none" stroke="url(#growthLine)" stroke-width="2.5" vector-effect="non-scaling-stroke"/>
                    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="4.5" fill="#22d3ee"/>
                </svg>`;

            const reachedHrs = (milestones || []).filter(m => m.reached).map(m => m.hours);
            const nextIdx = (milestones || []).findIndex(m => !m.reached);
            msWrap.innerHTML = (milestones || []).map((m, i) => {
                const cls = m.reached ? 'reached' : (i === nextIdx ? 'next' : '');
                const mark = m.reached ? '✓' : (i === nextIdx ? '◆' : '○');
                const meta = m.reached ? `reached ${m.reached}` : (i === nextIdx ? 'next target' : 'upcoming');
                return `<div class="milestone ${cls}">
                    <div class="milestone-check">${mark}</div>
                    <div>
                        <div class="milestone-label">${m.label}</div>
                        <div class="milestone-meta">${meta}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderActivity(activities) {
            const feed = document.getElementById('activity-feed');
            const icons = {
                deploy: '🚀',
                integration: '🔌',
                update: '✨'
            };

            feed.innerHTML = activities.slice(0, 4).map(activity => `
                <div class="activity-item">
                    <div class="activity-icon ${activity.type}">${icons[activity.type] || '📌'}</div>
                    <div class="activity-text">${activity.event}</div>
                    <div class="activity-time">${formatTime(activity.timestamp)}</div>
                </div>
            `).join('');
        }

        function timeSavedBlock(project) {
            const ts = project.timeSaved;
            if (!ts) return '';
            const badge = project.verification
                ? `<span class="verify-badge ${project.verification}">${project.verification.replace('-', ' ')}</span>`
                : '';
            let value;
            if (ts.weeklyMinutes > 0) {
                const hrs = Math.round(ts.weeklyMinutes / 60 * 10) / 10;
                value = project.status === 'production'
                    ? `⏱ ~${hrs} hrs/week saved`
                    : `⏱ ~${hrs} hrs/week while active`;
            } else if (ts.oneTimeMinutes > 0) {
                value = `⏱ one-time: ~${Math.round(ts.oneTimeMinutes / 60 * 10) / 10} hrs saved`;
            } else {
                value = `⏱ ${project.id === 'restic-backup' ? 'insurance, not hours' : 'not claiming hours'}`;
            }
            return `
                    <div class="time-saved">
                        <span class="time-saved-value">${value}${badge}</span>
                        <span class="time-saved-calc">${ts.calculation || ''}</span>
                    </div>`;
        }

        function projectCard(project, inactive) {
            return `
                <div class="project-card${inactive ? ' inactive' : ''}">
                    <div class="project-header">
                        <div class="project-icon">${project.icon}</div>
                        <span class="project-status ${project.status}">${project.status}</span>
                    </div>
                    <h3 class="project-name">${project.name}</h3>
                    <p class="project-tagline">${project.tagline}</p>
                    <p class="project-description">${project.description}</p>
                    <div class="project-impact">
                        ${project.impact.map(i => `<div class="impact-item">${i}</div>`).join('')}
                    </div>
                    ${timeSavedBlock(project)}
                    <div class="project-tech">
                        ${project.tech.map(t => `<span class="tech-tag">${t}</span>`).join('')}
                    </div>
                    ${project.repo ? `<a href="${project.repo}" class="project-link" target="_blank">View Repository →</a>` : ''}
                </div>`;
        }

        function renderProjects(projects) {
            projects = projects.filter(p => p.publish !== false);
            const live = projects.filter(p => p.status === 'production' || p.status === 'development' || p.status === 'draft');
            const history = projects.filter(p => !live.includes(p));

            document.getElementById('projects-grid').innerHTML =
                live.map(p => projectCard(p, false)).join('');

            const historySection = document.getElementById('history-section');
            if (history.length) {
                document.getElementById('history-grid').innerHTML =
                    history.map(p => projectCard(p, true)).join('');
            } else {
                historySection.style.display = 'none';
            }
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const mins = Math.floor(diff / (1000 * 60));
            const hours = Math.floor(diff / (1000 * 60 * 60));

            if (mins < 5) return 'Just now';
            if (mins < 60) return `${mins}m ago`;
            if (hours < 24) return `${hours}h ago`;
            return date.toLocaleDateString();
        }

        loadData();
    </script>
</body>
</html>
